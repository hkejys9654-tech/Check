<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>봉선 출석통계 시스템</title>
<meta name="theme-color" content="#0b4fb3">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
:root{
  --primary:#0b4fb3;
  --primary-dark:#073b91;
  --primary-deep:#062c73;
  --primary-soft:#eaf3ff;
  --navy:#183a6b;
  --accent:#4a90e2;
  --green:#2ECC71;
  --pink:#EC5F97;
  --purple:#8E5BE8;
  --orange:#f39c12;
  --red:#e74c3c;
  --bg:#f2f6fc;
  --card:#fff;
  --line:#e5edf7;
  --text:#27364a;
  --muted:#8b98aa;
  --shadow:0 12px 30px rgba(25,62,110,.10);
  --soft-shadow:0 6px 18px rgba(24,55,96,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{max-width:100%;overflow-x:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  background:
    radial-gradient(circle at 20% 0%,rgba(74,144,226,.16),transparent 30%),
    linear-gradient(180deg,#f4f8ff 0%,#eef4fb 42%,#f7f9fd 100%);
  color:var(--text);
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
button,select,input,textarea{font-family:inherit}
button{cursor:pointer;border:none}

header{
  position:sticky;
  top:0;
  z-index:100;
  color:white;
  background:
    radial-gradient(circle at 20% 20%,rgba(255,255,255,.16),transparent 28%),
    linear-gradient(145deg,var(--primary-deep),var(--primary));
  padding:18px 16px 0;
  box-shadow:0 10px 26px rgba(11,79,179,.28);
}
.top-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
  gap:10px;
}
.left-title-wrap{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
  flex:1;
}
.home-btn{
  width:44px;
  height:44px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.22);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.16);
  backdrop-filter:blur(8px);
  flex-shrink:0;
}
.home-btn i{
  width:23px;
  height:23px;
}
header h1{
  font-size:1.14rem;
  font-weight:950;
  letter-spacing:-.8px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.header-actions{
  display:flex;
  align-items:center;
  gap:7px;
  flex-shrink:0;
}
.notice-btn,
.excel-btn{
  width:48px;
  height:48px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  color:white;
  border:1px solid rgba(255,255,255,.22);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.16);
  backdrop-filter:blur(8px);
}
.notice-btn{background:rgba(255,255,255,.22)}
.excel-btn{background:rgba(46,204,113,.26)}
.notice-btn span,
.excel-btn span{
  display:block;
  font-size:.68rem;
  font-weight:950;
  line-height:1;
  letter-spacing:-.3px;
}
.notice-btn i,
.excel-btn i{
  width:19px;
  height:19px;
}
.month-context{
  text-align:center;
  font-size:1rem;
  font-weight:950;
  padding-bottom:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  letter-spacing:-.4px;
}
.month-context i{width:22px;height:22px}
.tab-shell{
  margin:0 -16px;
  padding:0 16px;
  background:white;
  border-radius:22px 22px 0 0;
  box-shadow:0 -6px 18px rgba(0,0,0,.06);
}
.tabs{display:flex;height:64px}
.tab-btn{
  flex:1;
  background:none;
  color:#4b5563;
  font-size:.82rem;
  font-weight:950;
  border-bottom:4px solid transparent;
  padding-top:7px;
  letter-spacing:-.4px;
}
.tab-btn i{
  display:block;
  margin:0 auto 4px;
  width:23px;
  height:23px;
  color:#555;
}
.tab-btn.active{
  color:var(--primary);
  border-bottom-color:var(--primary);
}
.tab-btn.active i{color:var(--primary)}

main{padding:14px 14px 76px}
.filter-card,.card{
  background:rgba(255,255,255,.96);
  border-radius:22px;
  padding:14px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
  border:1px solid rgba(225,235,248,.9);
}
.filter-card{
  padding:16px;
  border-radius:0 0 24px 24px;
  margin-top:-14px;
}
.card{padding:18px}
.filter-row,.personal-controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
}
.filter-row.single{grid-template-columns:1fr}
select,input[type="date"],input[type="number"],input[type="text"],textarea{
  min-width:0;
  padding:12px 10px;
  border:2px solid var(--line);
  border-radius:14px;
  font-size:.9rem;
  background:white;
  color:var(--navy);
  font-weight:900;
  appearance:none;
  -webkit-appearance:none;
  text-align:center;
  box-shadow:0 3px 10px rgba(24,55,96,.04);
}
textarea{
  text-align:left;
  min-height:150px;
  resize:vertical;
  line-height:1.55;
}
.refresh-btn,.btn-save{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,#5aa3f0,#327edb);
  color:white;
  border-radius:15px;
  font-size:.98rem;
  font-weight:950;
  margin-top:10px;
  box-shadow:0 8px 18px rgba(74,144,226,.28);
}
.btn-save{background:linear-gradient(135deg,var(--navy),#0b4fb3)}
.btn-danger{background:#fee2e2;color:#c0392b;box-shadow:none}

.card-title{
  font-size:1.04rem;
  font-weight:950;
  color:var(--navy);
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:9px;
  letter-spacing:-.5px;
}
.card-title i{
  width:23px;
  height:23px;
  color:var(--primary);
}

.summary-grid,.category-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:16px;
}
.category-grid{
  grid-template-columns:repeat(4,1fr);
  margin-bottom:0;
}
.summary-card,.cat-card{
  position:relative;
  overflow:hidden;
  background:white;
  border-radius:20px;
  padding:14px 9px;
  box-shadow:var(--soft-shadow);
  border:1px solid var(--line);
  text-align:center;
}
.summary-card{
  min-height:112px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.summary-card:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(145deg,rgba(11,79,179,.10),rgba(255,255,255,0) 55%);
  pointer-events:none;
}
.summary-card:after{
  content:"";
  position:absolute;
  width:68px;
  height:68px;
  border-radius:50%;
  right:-24px;
  bottom:-28px;
  background:rgba(11,79,179,.12);
}
.summary-icon{
  width:32px;
  height:32px;
  margin:0 auto 7px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  background:linear-gradient(145deg,var(--primary),#5aa3f0);
  box-shadow:0 6px 14px rgba(11,79,179,.22);
}
.summary-icon i{width:19px;height:19px}
.s-label,.cat-name{
  position:relative;
  z-index:1;
  font-size:.75rem;
  font-weight:950;
  color:#374151;
  margin-bottom:4px;
  letter-spacing:-.4px;
}
.s-num,.cat-num{
  position:relative;
  z-index:1;
  font-size:1.45rem;
  font-weight:1000;
  color:var(--primary);
  letter-spacing:-1px;
  line-height:1.1;
}

.cat-card{
  padding:14px 7px;
  border-top:5px solid var(--cat,#0b4fb3);
  min-height:112px;
}
.cat-card:before{
  content:"";
  position:absolute;
  width:70px;
  height:70px;
  border-radius:50%;
  right:-30px;
  top:-32px;
  background:rgba(11,79,179,.08);
}
.cat-icon{
  position:relative;
  z-index:1;
  width:30px;
  height:30px;
  margin:0 auto 6px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f3f7ff;
  color:var(--cat,#0b4fb3);
  font-size:1rem;
  font-weight:950;
}
.cat-num{color:var(--cat,var(--primary));font-size:1.32rem}
.cat-rate{
  position:relative;
  z-index:1;
  font-size:.86rem;
  color:var(--cat,var(--primary));
  font-weight:950;
  margin-top:5px;
}

.meeting-table,.district-table,.stats-table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:.84rem;
  background:white;
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 3px 12px rgba(24,55,96,.05);
}
.meeting-table th,.district-table th,.stats-table th{
  background:#f2f7ff;
  color:#52606f;
  padding:12px 5px;
  text-align:center;
  border-bottom:1px solid var(--line);
  font-weight:950;
}
.meeting-table td,.district-table td,.stats-table td{
  padding:12px 5px;
  text-align:center;
  border-bottom:1px solid #edf2f8;
}
.meeting-table tr:last-child td,
.district-table tr:last-child td,
.stats-table tr:last-child td{border-bottom:none}
.district-table td:first-child,.stats-table td:first-child{
  font-weight:950;
  color:var(--navy);
  text-align:left;
  padding-left:8px;
}
.meeting-name{
  display:flex;
  align-items:center;
  gap:7px;
  font-weight:950;
  color:var(--navy);
  text-align:left;
}
.meeting-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--primary);
  box-shadow:0 0 0 4px rgba(11,79,179,.10);
  flex-shrink:0;
}
.avg-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:58px;
  padding:6px 8px;
  border-radius:999px;
  background:#eef6ff;
  color:var(--navy);
  font-weight:950;
}
.rate-box{min-width:58px}
.rate-text{
  color:var(--primary);
  font-weight:1000;
  font-size:.94rem;
  line-height:1;
}
.mini-track{
  height:5px;
  margin:5px auto 0;
  width:54px;
  border-radius:99px;
  background:#e8eef7;
  overflow:hidden;
}
.mini-fill{
  height:100%;
  border-radius:99px;
  background:linear-gradient(90deg,#0b4fb3,#5aa3f0);
}
.percent{color:var(--primary);font-weight:950}
.td-eun{color:#666}
.td-bong{color:var(--green);font-weight:850}
.td-mom{color:var(--pink);font-weight:850}
.td-youth{color:var(--purple);font-weight:850}
.td-total{font-weight:950;color:var(--navy)}
.not-submitted{color:#bbb!important;font-size:.8rem}
.submit-time{font-size:.7rem;color:#aaa;display:block;margin-top:1px}
.badge{
  display:inline-block;
  font-size:.72rem;
  padding:4px 8px;
  border-radius:999px;
  font-weight:950;
  margin-left:6px;
}
.badge-ok{background:#dcfce7;color:#166634}
.badge-no{background:#fee2e2;color:#991b1b}
.empty-msg,.loading{
  text-align:center;
  color:#9aa7b8;
  padding:30px 0;
  font-size:.9rem;
  line-height:1.55;
}
.note{
  background:linear-gradient(135deg,#edf5ff,#e7f1ff);
  color:#4a6078;
  padding:12px 13px;
  border-radius:15px;
  font-size:.8rem;
  line-height:1.5;
  margin-top:14px;
  border:1px solid #dbeaff;
}
.has-data{cursor:pointer}
.has-data:active{background:#eef6ff}

.personal-member-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:11px 12px;
  border-radius:15px;
  background:#f8fbff;
  margin-bottom:8px;
  border-left:5px solid #dbe4ee;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(24,55,96,.04);
}
.personal-member-name{
  width:58px;
  flex-shrink:0;
  font-size:.9rem;
  font-weight:950;
  color:var(--navy);
}
.district-mini{font-size:.7rem;color:#999;margin-top:2px}
.personal-bar-wrap{
  flex:1;
  height:13px;
  background:#e7edf5;
  border-radius:99px;
  overflow:hidden;
}
.personal-bar{height:100%;border-radius:99px}
.bar-high{background:linear-gradient(90deg,#27ae60,#2ecc71)}
.bar-mid{background:linear-gradient(90deg,#f39c12,#f7bd45)}
.bar-low{background:linear-gradient(90deg,#e74c3c,#ff7a6b)}
.bar-zero{background:#d8dee8}
.personal-count{
  width:46px;
  text-align:right;
  font-size:.82rem;
  font-weight:950;
  color:#555;
}
.personal-detail{
  display:none;
  background:#f0f6ff;
  border:1.5px solid #cdd9f0;
  border-radius:16px;
  padding:14px;
  margin:10px 0 12px;
}
.date-dot-wrap{display:flex;flex-wrap:wrap;gap:5px}
.date-dot{
  padding:6px 8px;
  border-radius:9px;
  font-size:.72rem;
  font-weight:950;
}
.date-dot.present{background:var(--accent);color:white}
.date-dot.absent{background:#fee2e2;color:#c0392b}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  z-index:1000;
  justify-content:center;
  align-items:center;
}
.modal.show{display:flex}
.modal-box{
  background:white;
  width:88%;
  max-width:430px;
  border-radius:22px;
  padding:22px 20px;
  box-shadow:0 12px 34px rgba(0,0,0,.24);
  max-height:86vh;
  overflow-y:auto;
}
.modal-box h3{
  font-size:1.05rem;
  font-weight:950;
  color:var(--navy);
  margin-bottom:16px;
}
.edit-info{
  background:#f8f9fa;
  border-radius:12px;
  padding:10px 12px;
  margin-bottom:14px;
  font-size:.88rem;
  color:#555;
  line-height:1.7;
}
.edit-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.edit-row label{
  font-size:.9rem;
  font-weight:950;
  width:70px;
  flex-shrink:0;
}
.edit-row input,.edit-row select{flex:1}
.edit-total-preview{text-align:center;font-size:.9rem;color:#888;margin:4px 0 14px}
.modal-btn-row{display:flex;gap:8px;margin-top:4px}
.btn-edit-save,.btn-edit-delete,.btn-edit-cancel{
  padding:13px;
  border-radius:12px;
  font-size:.95rem;
  font-weight:950;
}
.btn-edit-save{flex:2;background:var(--navy);color:white}
.btn-edit-delete{flex:1;background:#fee2e2;color:#c0392b}
.btn-edit-cancel{flex:1;background:#f0f0f0;color:#555}

.pin-display{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:20px;
}
.pin-dot{
  width:16px;
  height:16px;
  border-radius:50%;
  background:#e0e0e0;
}
.pin-dot.filled{background:var(--primary)}
.pin-pad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.pin-btn{
  padding:16px;
  border:1.5px solid #e0e0e0;
  border-radius:12px;
  background:white;
  font-size:1.2rem;
  font-weight:850;
}
.pin-btn.del{color:#e53e3e;font-size:1rem}
.pin-error{
  text-align:center;
  color:#e53e3e;
  font-size:.85rem;
  margin-top:10px;
  min-height:18px;
}
.pin-cancel{
  width:100%;
  margin-top:12px;
  padding:12px;
  background:#f0f0f0;
  color:#555;
  border-radius:12px;
  font-size:.95rem;
  font-weight:850;
}
.notice-preview{
  background:#f8fbff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  font-size:.84rem;
  color:#52606f;
  line-height:1.55;
  margin-top:10px;
  white-space:pre-line;
}
.notice-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:
